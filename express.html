<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Diagnóstico Imobiliário Express · OUSE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,900&family=Barlow:wght@300;400;500;700&family=Permanent+Marker&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#FF3F34; --green:#34FF48; --black:#080808; --white:#F4F1EC;
  --gray:#141414; --mid:#1e1e1e;
  --rule:rgba(244,241,236,.10);
  --muted:rgba(244,241,236,.5);
  --cond:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:var(--body);background:var(--black);color:var(--white);font-weight:300;overflow:hidden;-webkit-font-smoothing:antialiased;}
::selection{background:var(--orange);color:var(--black);}
a{color:inherit;text-decoration:none;}
.hand{font-family:'Permanent Marker',cursive;color:var(--orange);font-weight:400;}

.cursor{position:fixed;top:0;left:0;width:12px;height:12px;border-radius:50%;background:var(--orange);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .25s,height .25s;}
.cursor.hov{width:42px;height:42px;}
@media(hover:none),(max-width:900px){.cursor{display:none!important;}}

.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(244,241,236,.018) 80px),repeating-linear-gradient(90deg,transparent,transparent 79px,rgba(244,241,236,.018) 80px);}
.glow{position:absolute;width:60vw;height:60vw;border-radius:50%;will-change:transform;}
.glow.a{background:radial-gradient(circle,rgba(255,63,52,.18),transparent 65%);top:-15%;right:-10%;}
.glow.b{background:radial-gradient(circle,rgba(255,63,52,.10),transparent 65%);bottom:-20%;left:-12%;}

.top{position:fixed;top:0;left:0;right:0;z-index:50;padding:20px 5vw 0;}
.top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.brand{font-family:var(--cond);font-weight:900;font-size:22px;letter-spacing:.04em;}
.brand b{color:var(--orange);}
.counter{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.1em;}
.counter b{color:var(--orange);}
.exit{font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.exit:hover{color:var(--white);}
.prog{height:3px;background:var(--rule);border-radius:3px;overflow:hidden;}
.prog i{display:block;height:100%;width:0;background:var(--orange);border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1);}

.stage{position:relative;z-index:10;height:100%;display:flex;align-items:center;padding:90px 5vw 100px;}
.screen{width:100%;max-width:880px;margin:0 auto;}
.eyebrow{font-family:var(--cond);font-weight:900;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--orange);display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;}
.eyebrow::before{content:'';width:26px;height:2px;background:var(--orange);}
.q-num{font-family:var(--cond);font-weight:900;font-size:clamp(40px,7vw,90px);line-height:.8;color:rgba(244,241,236,.12);letter-spacing:-.04em;margin-bottom:4px;}
.q-title{font-family:var(--cond);font-weight:900;text-transform:uppercase;font-size:clamp(28px,4.6vw,58px);line-height:.98;letter-spacing:-.02em;margin-bottom:10px;max-width:20ch;}
.q-help{font-size:14px;color:var(--muted);margin-bottom:26px;max-width:54ch;line-height:1.55;}
.opts{display:flex;flex-direction:column;gap:10px;margin-top:26px;max-width:640px;}
.opt{display:flex;align-items:center;gap:16px;padding:16px 20px;border:1px solid var(--rule);border-radius:6px;background:rgba(20,20,20,.6);cursor:pointer;transition:transform .18s,border-color .2s,background .2s;backdrop-filter:blur(4px);}
.opt:hover{transform:translateX(6px);border-color:var(--muted);background:var(--mid);}
.opt .key{width:30px;height:30px;flex-shrink:0;border:1px solid var(--rule);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-weight:900;font-size:14px;color:var(--muted);transition:all .2s;}
.opt .tx{font-family:var(--body);font-weight:400;font-size:clamp(15px,1.7vw,18px);color:#ddd9d0;}
.opt:hover .key{border-color:var(--orange);color:var(--orange);}
.opt.sel{border-color:var(--orange);background:rgba(255,63,52,.12);transform:translateX(6px);}
.opt.sel .key{background:var(--orange);border-color:var(--orange);color:var(--black);}
.opt.sel .tx{color:#fff;}
.opt.check .key{border-radius:50%;}

.cta-row{margin-top:30px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.btn{font-family:var(--cond);font-weight:900;font-size:16px;letter-spacing:.04em;text-transform:uppercase;padding:15px 32px;border-radius:100px;cursor:pointer;border:1px solid var(--orange);background:var(--orange);color:var(--black);display:inline-flex;align-items:center;gap:12px;transition:transform .25s,box-shadow .25s,opacity .2s;}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(255,63,52,.32);}
.btn[disabled]{opacity:.35;pointer-events:none;}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--rule);}
.btn-ghost:hover{color:var(--white);border-color:var(--muted);box-shadow:none;}
.hint{font-family:var(--mono);font-size:11px;color:rgba(244,241,236,.3);letter-spacing:.04em;}

.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px;max-width:600px;}
.field{display:flex;flex-direction:column;gap:7px;}
.field label{font-family:var(--cond);font-weight:700;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.field input{background:rgba(20,20,20,.7);border:1px solid var(--rule);border-radius:6px;padding:15px 16px;color:#fff;font-family:var(--body);font-size:16px;transition:border-color .2s;}
.field input:focus{outline:none;border-color:var(--orange);}
@media(max-width:620px){.fields{grid-template-columns:1fr;}}

.big-h{font-family:var(--cond);font-weight:900;text-transform:uppercase;font-size:clamp(40px,8vw,96px);line-height:.86;letter-spacing:-.03em;}
.big-h .o{color:var(--orange);}
.lead{font-size:clamp(16px,1.8vw,20px);color:#cfccc4;line-height:1.6;margin-top:22px;max-width:48ch;}
.done-mark{width:78px;height:78px;border-radius:50%;background:var(--green);color:var(--black);display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;margin-bottom:28px;}

.bk{position:fixed;left:5vw;bottom:30px;z-index:50;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:color .2s;}
.bk:hover{color:var(--white);}
.bk.hidden{opacity:0;pointer-events:none;}
.kbd{position:fixed;right:5vw;bottom:30px;z-index:50;font-family:var(--mono);font-size:10.5px;color:rgba(244,241,236,.3);letter-spacing:.04em;}
@media(max-width:760px){.kbd{display:none;}}
</style>
</head>
<body>
<div class="cursor"></div>
<div class="bg"><div class="bg-grid"></div><div class="glow a" id="gA"></div><div class="glow b" id="gB"></div></div>

<div class="top">
  <div class="top-row">
    <a href="index.html" class="brand" data-c>OU<b>SE</b></a>
    <div class="counter" id="counter"></div>
    <a href="index.html" class="exit" data-c>✕ Sair</a>
  </div>
  <div class="prog"><i id="prog"></i></div>
</div>

<div class="stage"><div class="screen" id="screen"></div></div>
<div class="bk hidden" id="back" data-c>← Voltar</div>
<div class="kbd" id="kbd"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ===== CONFIG (mesmos canais do diagnóstico) ===== */
const WEB3FORMS_KEY   = '6894e59b-da65-4152-bb85-fc03193c11a5';
const WHATSAPP_PHONE  = '554195351000';
const WHATSAPP_APIKEY = '7706708';

/* ===== TELAS: contato (1º, igual ao outro form) + 11 perguntas ===== */
const Q = [
  {id:'_contato', contact:true},
  {id:'perfil', t:'Quem é você hoje?', opts:['Corretor autônomo','Corretor de imobiliária','Imobiliária pequena','Incorporadora pequena','Outro']},
  {id:'corretores', t:'Quantos corretores atuam na sua operação hoje?', skipIf:a=>a.perfil==='Corretor autônomo', opts:['1 a 3','4 a 10','11 a 25','Mais de 25','Não se aplica']},
  {id:'vendas', t:'Quantos milhões em vendas você realizou nos últimos 6 meses?', opts:['Ainda não vendi','Até R$ 1 milhão','R$ 1 a R$ 3 milhões','R$ 3 a R$ 10 milhões','Acima de R$ 10 milhões']},
  {id:'trafego', t:'Hoje você tem alguém cuidando do tráfego pago?', opts:['Não','Eu mesmo faço','Freelancer','Agência','Equipe interna']},
  {id:'site', t:'Você tem site próprio?', opts:['Não tenho','Tenho, mas quase não gera resultado','Tenho e recebo alguns contatos','Tenho e é uma fonte importante de leads']},
  {id:'investimento', t:'Quanto você investe em marketing por mês no total?', help:'Considere o valor completo: anúncios, agência, freelancer, equipe interna e ferramentas.', opts:['Não invisto','Até R$ 500','R$ 500 a R$ 2.000','R$ 2.000 a R$ 5.000','Acima de R$ 5.000']},
  {id:'origem', t:'De onde vêm seus clientes hoje?', help:'Pode marcar mais de um.', multi:true, opts:['Indicação','Instagram','Portais imobiliários','Google','Tráfego pago','Parcerias','Carteira de clientes','Base antiga','Outros']},
  {id:'organizacao', t:'Como você organiza seus clientes?', opts:['Só WhatsApp','Planilha','CRM simples','CRM com rotina comercial definida']},
  {id:'trava', t:'O que mais trava seu crescimento hoje?', opts:['Falta de leads','Falta de tempo','Baixa conversão','Marketing sem resultado','Não sei exatamente']},
  {id:'meta', t:'Qual sua principal meta agora?', opts:['Vender mais','Captar mais imóveis','Organizar minha operação','Melhorar marketing']},
  {id:'maturidade', t:'Como você se sente em relação ao marketing imobiliário hoje?', opts:['Não entendo e não quero me envolver com isso','Não entendo, mas quero aprender o básico','Entendo um pouco, mas ainda me sinto perdido','Entendo o básico para acompanhar conversas e decisões','Entendo bem e participo ativamente das decisões']},
];
const LETTERS='ABCDEFGHI';
const answers={};
let i=0, busy=false;
const screen=document.getElementById('screen'),prog=document.getElementById('prog'),counter=document.getElementById('counter'),backBtn=document.getElementById('back'),kbd=document.getElementById('kbd');

/* fluxo ativo (aplica regras condicionais como skipIf) */
const flow=()=>Q.map((q,idx)=>idx).filter(idx=>!(Q[idx].skipIf&&Q[idx].skipIf(answers)));
const qFlow=()=>flow().filter(idx=>!Q[idx].contact);
const v=id=>(document.getElementById(id).value||'').trim();

function render(dir){
  const q=Q[i]; let html='';
  if(q.contact){
    html=`<div class="eyebrow">Diagnóstico Express</div>
      <div class="q-title">Antes de começar, <span class="hand" style="font-size:.78em">quem é você?</span></div>
      <div class="q-help">Tudo obrigatório — é assim que a OUSE manda seu diagnóstico.</div>
      <div class="fields">
        <div class="field"><label>Nome</label><input id="f_nome" type="text" autocomplete="name" placeholder="Seu nome"></div>
        <div class="field"><label>Empresa</label><input id="f_empresa" type="text" autocomplete="organization" placeholder="Sua empresa"></div>
        <div class="field"><label>WhatsApp</label><input id="f_zap" type="tel" inputmode="numeric" autocomplete="tel" data-mask="phone" placeholder="(41) 99999-9999"></div>
        <div class="field"><label>E-mail</label><input id="f_email" type="email" inputmode="email" autocomplete="email" placeholder="voce@empresa.com.br"></div>
      </div>
      <div class="cta-row"><button class="btn" id="begin">Começar →</button><span class="hint" id="ferr"></span></div>`;
  } else {
    html=`<div class="q-num">${String(qFlow().indexOf(i)+1).padStart(2,'0')}</div>
      <div class="q-title">${q.t}</div>
      ${q.help?`<div class="q-help">${q.help}</div>`:''}
      <div class="opts">${q.opts.map((o,k)=>`<div class="opt ${q.multi?'check':''}" data-k="${k}" data-c><span class="key">${LETTERS[k]||k+1}</span><span class="tx">${o}</span></div>`).join('')}</div>
      ${q.multi?`<div class="cta-row"><button class="btn" id="cont" disabled>Continuar →</button><span class="hint">marque os que se aplicam</span></div>`:''}`;
  }
  screen.innerHTML=html;

  const fromX=dir<0?-40:40;
  gsap.fromTo(screen,{x:fromX,opacity:0},{x:0,opacity:1,duration:.5,ease:'power3.out'});
  gsap.from(screen.querySelectorAll('.q-num,.eyebrow'),{y:18,opacity:0,duration:.5,ease:'power3.out'});
  gsap.from(screen.querySelector('.q-title'),{y:22,opacity:0,duration:.55,delay:.05,ease:'power3.out'});
  gsap.from(screen.querySelectorAll('.opt,.field,.cta-row'),{y:16,opacity:0,duration:.45,stagger:.05,delay:.12,ease:'power3.out'});

  if(q.contact){
    [['nome','f_nome'],['empresa','f_empresa'],['whatsapp','f_zap'],['email','f_email']].forEach(([a,id])=>{if(answers[a])document.getElementById(id).value=answers[a];});
    document.getElementById('f_zap').addEventListener('input',maskPhone);
    document.getElementById('begin').addEventListener('click',begin);
  } else if(q.multi && Array.isArray(answers[q.id])){
    screen.querySelectorAll('.opt').forEach(o=>{if(answers[q.id].includes(q.opts[+o.dataset.k]))o.classList.add('sel');});
    syncContinue();
  } else if(!q.multi && answers[q.id]){
    const s=q.opts.indexOf(answers[q.id]); if(s>=0)screen.querySelector(`.opt[data-k="${s}"]`)?.classList.add('sel');
  }
  if(!q.contact)attach(q);

  const f=flow(), pos=f.indexOf(i);
  prog.style.width=(pos/(f.length-1))*100+'%';
  counter.innerHTML = q.contact?'CONTATO':`<b>${String(qFlow().indexOf(i)+1).padStart(2,'0')}</b> / ${qFlow().length}`;
  backBtn.classList.toggle('hidden', pos===0);
  kbd.textContent = q.contact?'preencha e clique começar':(q.multi?'1–9 marca · enter continua':'A–E ou 1–9 pra escolher');
  gsap.to('#gA',{xPercent:(pos%3-1)*14,yPercent:(pos%2)*10,duration:1.2,ease:'power2.out'});
  gsap.to('#gB',{xPercent:(pos%2-0.5)*16,duration:1.4,ease:'power2.out'});
}

function attach(q){
  screen.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click',()=>{
      const val=q.opts[+o.dataset.k];
      if(q.multi){
        o.classList.toggle('sel');
        answers[q.id]=answers[q.id]||[];
        const idx=answers[q.id].indexOf(val); if(idx>=0)answers[q.id].splice(idx,1); else answers[q.id].push(val);
        syncContinue();
      } else {
        if(busy)return; busy=true;
        screen.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        o.classList.add('sel'); answers[q.id]=val;
        gsap.fromTo(o,{scale:1},{scale:1.03,duration:.12,yoyo:true,repeat:1,ease:'power1.inOut'});
        setTimeout(()=>{busy=false;advance();},420);
      }
    });
  });
  if(q.multi){const c=document.getElementById('cont');c&&c.addEventListener('click',advance);}
}
function syncContinue(){const q=Q[i],c=document.getElementById('cont');if(c)c.disabled=!(answers[q.id]&&answers[q.id].length);}

function advance(){const f=flow(),pos=f.indexOf(i);if(pos>=f.length-1){submit();return;}animOut(()=>{i=f[pos+1];render(1);});}
function back(){const f=flow(),pos=f.indexOf(i);if(pos>0)animOut(()=>{i=f[pos-1];render(-1);});}
function animOut(cb){gsap.to(screen,{x:-30,opacity:0,duration:.32,ease:'power2.in',onComplete:cb});}
backBtn.addEventListener('click',back);

/* contato (1ª tela) — tudo obrigatório */
function begin(){
  const nome=v('f_nome'),empresa=v('f_empresa'),zap=v('f_zap'),email=v('f_email');
  const err=document.getElementById('ferr');
  if(!nome||!empresa||zap.replace(/\D/g,'').length<10||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    err.textContent='Preencha nome, empresa, WhatsApp e e-mail válidos.';err.style.color='#ff6b6b';return;
  }
  answers.nome=nome;answers.empresa=empresa;answers.whatsapp=zap;answers.email=email;
  advance();
}

/* teclado */
document.addEventListener('keydown',e=>{
  const q=Q[i]; if(!q||q.contact)return;
  if(e.key==='Backspace'){back();return;}
  if(e.key==='Enter'&&q.multi){advance();return;}
  let k=-1; if(/^[1-9]$/.test(e.key))k=+e.key-1; else {const up=e.key.toUpperCase();if(LETTERS.includes(up))k=LETTERS.indexOf(up);}
  if(k>=0){const o=screen.querySelector(`.opt[data-k="${k}"]`);if(o)o.click();}
});

function maskPhone(e){const inp=e.target;let val=inp.value.replace(/\D/g,'').slice(0,11),out='';
  if(val.length>10)out='('+val.slice(0,2)+') '+val.slice(2,7)+'-'+val.slice(7);
  else if(val.length>6)out='('+val.slice(0,2)+') '+val.slice(2,6)+'-'+val.slice(6);
  else if(val.length>2)out='('+val.slice(0,2)+') '+val.slice(2);
  else if(val.length)out='('+val; inp.value=out;}

function submit(){
  const L=x=>Array.isArray(x)?(x.join(', ')||'—'):(x||'—');
  const resumo=`Nome: ${answers.nome}
Empresa: ${answers.empresa}
WhatsApp: ${answers.whatsapp}
E-mail: ${answers.email}
Perfil: ${L(answers.perfil)}
Corretores: ${L(answers.corretores)}
Vendas 6m: ${L(answers.vendas)}
Tráfego pago: ${L(answers.trafego)}
Site: ${L(answers.site)}
Investimento/mês: ${L(answers.investimento)}
Origem clientes: ${L(answers.origem)}
Organização: ${L(answers.organizacao)}
Trava: ${L(answers.trava)}
Meta: ${L(answers.meta)}
Maturidade mkt: ${L(answers.maturidade)}`;
  i='done'; renderDone(answers.nome);
  if(WEB3FORMS_KEY){const fd=new FormData();fd.append('access_key',WEB3FORMS_KEY);fd.append('subject',`⚡ Diagnóstico EXPRESS — ${answers.nome}`);fd.append('from_name','Site OUSE · Express');fd.append('email',answers.email);fd.append('nome',answers.nome);fd.append('empresa',answers.empresa);fd.append('whatsapp',answers.whatsapp);fd.append('resumo',resumo);fetch('https://api.web3forms.com/submit',{method:'POST',body:fd}).catch(()=>{});}
  if(WHATSAPP_PHONE&&WHATSAPP_APIKEY){const msg=encodeURIComponent('⚡ Diagnóstico EXPRESS\n\n'+resumo);fetch(`https://api.callmebot.com/whatsapp.php?phone=${WHATSAPP_PHONE}&text=${msg}&apikey=${WHATSAPP_APIKEY}`,{mode:'no-cors'}).catch(()=>{});}
}

function renderDone(nome){
  prog.style.width='100%';counter.textContent='';backBtn.classList.add('hidden');kbd.textContent='';
  screen.innerHTML=`<div class="done-mark">✓</div>
    <div class="big-h">${nome?`Valeu, ${nome.split(' ')[0]}.<br>`:''}Recebemos <span class="o">tudo.</span></div>
    <p class="lead">A OUSE vai ler seu momento e te chamar com um diagnóstico do que destrava seu próximo nível. Fica de olho no WhatsApp.</p>
    <div class="cta-row"><a href="index.html" class="btn">Conhecer a OUSE →</a><a href="https://wa.me/${WHATSAPP_PHONE}" class="btn btn-ghost" target="_blank" rel="noopener">Falar agora</a></div>`;
  gsap.from(screen.querySelector('.done-mark'),{scale:0,rotate:-90,duration:.6,ease:'back.out(2)'});
  gsap.from(screen.querySelectorAll('.big-h,.lead,.cta-row'),{y:24,opacity:0,duration:.6,stagger:.12,delay:.2,ease:'power3.out'});
}

gsap.to('#gA',{scale:1.12,duration:7,ease:'sine.inOut',repeat:-1,yoyo:true,transformOrigin:'center'});
gsap.to('#gB',{scale:1.1,duration:9,ease:'sine.inOut',repeat:-1,yoyo:true,transformOrigin:'center'});
(function(){const d=document.querySelector('.cursor');window.addEventListener('mousemove',e=>{d.style.left=e.clientX+'px';d.style.top=e.clientY+'px';});document.addEventListener('mouseover',e=>{d.classList.toggle('hov',!!e.target.closest('[data-c],.opt,.btn,input'));});})();

render(1);
</script>
</body>
</html>
